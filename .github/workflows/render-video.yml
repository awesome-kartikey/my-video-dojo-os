name: Render Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    name: Render video
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run prebuild tasks (BGM and durations)
        run: npm run prebuild

      - name: Render Remotion Video
        run: npx remotion render DojoDemo out/video.mp4 --concurrency=1

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DojoDemo-Video
          path: out/video.mp4
